    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function renderPanel(props) {
      document.getElementById('title').textContent = `${props.neighborhood} - ${props.city}`;
      document.getElementById('meta').innerHTML = `מובילה: <b>${props.top_party}</b> ${Number(props.top_party_percent).toFixed(1)}% · קלפיות: ${props.polling_places} · כשרים: ${props.valid_votes.toLocaleString('he-IL')}`;
      const max = Math.max(...PARTIES.map(p => Number(props[p.key] || 0)), 1);
      document.getElementById('bars').innerHTML = PARTIES
        .map(p => [p, Number(props[p.key] || 0)])
        .sort((a, b) => b[1] - a[1])
        .map(([p, value]) => `<div class="bar-row"><b>${value.toFixed(1)}%</b><span>${p.name}</span><span class="track"><span class="bar" style="width:${(value / max * 100).toFixed(1)}%; background:${COLORS[p.key] || '#777'}"></span></span></div>`)
        .join('');
    }

    const layer = L.geoJSON(DATA, {
      pointToLayer(feature, latlng) {
        const props = feature.properties;
        const radius = Math.max(7, Math.min(24, Math.sqrt(props.valid_votes || 0) / 9));
        return L.circleMarker(latlng, {
          radius,
          color: '#222',
          weight: 1.2,
          fillColor: COLORS[`r_${props.top_party_key}`] || '#999',
          fillOpacity: 0.72
        });
      },
      onEachFeature(feature, marker) {
        const props = feature.properties;
        marker.bindTooltip(`<b>${props.neighborhood}</b><br>${props.city}<br>${props.top_party} ${Number(props.top_party_percent).toFixed(1)}%`);
        marker.on('mouseover', () => {
          marker.setStyle({ weight: 3, fillOpacity: .95 });
          marker.bringToFront();
          renderPanel(props);
        });
        marker.on('mouseout', () => marker.setStyle({ weight: 1.2, fillOpacity: .72 }));
      }
    }).addTo(map);
    map.fitBounds(layer.getBounds(), { padding: [30, 30] });
    if (DATA.features.length) renderPanel(DATA.features[0].properties);
  </script>
</body>
</html>
